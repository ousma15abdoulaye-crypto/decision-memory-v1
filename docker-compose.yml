# DMS — dev local complet : Postgres + Redis + API + Annotation Backend + Label Studio
#
# Stack minimale (DB seule) :
#   docker compose up postgres
#
# Stack complete (tous les services) :
#   docker compose --profile full up -d
#
# Migrations (one-shot) :
#   docker compose run --rm migrate
#
# Voir Makefile pour les raccourcis : make up, make down, make test, make lint

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - dms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - full

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://dms:dms@postgres:5432/dms
      DMS_ALLOW_RAILWAY_MIGRATE: "1"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bash", "-c", "alembic upgrade head"]
    restart: "no"
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - full
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://dms:dms@postgres:5432/dms
      REDIS_URL: redis://redis:6379/0
      PORT: "8000"
      SECRET_KEY: dev-docker-compose-change-me
    env_file:
      - path: .env.docker
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  annotation-backend:
    build:
      context: .
      dockerfile: services/annotation-backend/Dockerfile
    profiles:
      - full
    ports:
      - "9090:9090"
    environment:
      PORT: "9090"
    env_file:
      - path: .env.docker
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  label-studio:
    image: heartexlabs/label-studio:latest
    profiles:
      - full
    ports:
      - "8080:8080"
    environment:
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/files
    volumes:
      - ls_data:/label-studio/data
      - ./data/uploads:/label-studio/files/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dms_pgdata:
  ls_data:
