# V3.3.2 — CI principale (Python 3.11, Postgres 15, tests, lint) — gates dynamiques
name: CI Main

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dmstest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+psycopg://postgres:testpass@localhost:5432/dmstest
      DATABASE_URL_RLS_TEST: postgresql+psycopg://dm_app:dm_app_ci_test@localhost:5432/dmstest
      PGPASSWORD: testpass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff" "black==26.1.0"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Python syntax check
        run: python -m compileall src -q

      - name: Proof — drivers versions
        run: |
          echo "=== Versions drivers (preuve C) ==="
          pip show alembic sqlalchemy psycopg | grep -E "^(Name|Version):"

      - name: Guard — single Alembic head (anti-multihead)
        run: |
          echo "=== Alembic heads verbose ==="
          python -m alembic heads -v
          echo "=== alembic/ filesystem (Linux view) ==="
          find alembic -maxdepth 2 -type f -name "*.py" | sort
          echo "=== Alembic current (before upgrade) ==="
          python -m alembic current 2>&1 && echo "(current OK)" || echo "(no current revision yet — DB empty, expected)"
          HEAD_COUNT=$(python -m alembic heads | wc -l)
          echo "HEAD_COUNT=$HEAD_COUNT"
          [ "$HEAD_COUNT" -eq 1 ] || { echo "FAIL: alembic heads returned $HEAD_COUNT heads — merge migration required"; exit 1; }

      - name: Run migrations (alembic upgrade head)
        run: |
          alembic upgrade head
          echo "=== Alembic current (after upgrade) ==="
          alembic current

      - name: Enable dm_app LOGIN for RLS integration tests
        run: |
          psql -h localhost -U postgres -d dmstest -c \
            "ALTER ROLE dm_app WITH LOGIN PASSWORD 'dm_app_ci_test';"

      - name: Proof — alembic_version in DB (DB-level)
        run: |
          echo "=== alembic_version (DB-level) ==="
          psql -h localhost -U postgres -d dmstest -c "SELECT version_num FROM alembic_version;"

      - name: Verify DB objects post-migration (forensic)
        run: |
          echo "=== Q1 — db + schema ==="
          psql -h localhost -U postgres -d dmstest -c \
            "SELECT current_database() AS db, current_schema() AS schema;"

          echo "=== Q2 — extraction_corrections (to_regclass) ==="
          psql -h localhost -U postgres -d dmstest -c \
            "SELECT to_regclass('public.extraction_corrections') AS extraction_corrections;"

          echo "=== Q3 — structured_data_effective (to_regclass) ==="
          psql -h localhost -U postgres -d dmstest -c \
            "SELECT to_regclass('public.structured_data_effective') AS structured_data_effective;"

          echo "=== Q4 — triggers sur extraction_corrections ==="
          psql -h localhost -U postgres -d dmstest -c \
            "SELECT trigger_name FROM information_schema.triggers WHERE event_object_table='extraction_corrections' ORDER BY trigger_name;"

          echo "=== Q5 — colonnes de extraction_corrections ==="
          psql -h localhost -U postgres -d dmstest -c \
            "SELECT column_name FROM information_schema.columns WHERE table_name='extraction_corrections' ORDER BY ordinal_position;"

          echo "=== Q6 — nombre de vues corrections ==="
          psql -h localhost -U postgres -d dmstest -c \
            "SELECT COUNT(*) AS views_cnt FROM information_schema.views WHERE table_name IN ('structured_data_effective','extraction_corrections_history');"

          # ── Assertions bloquantes ──────────────────────────────────
          TABLE=$(psql -h localhost -U postgres -d dmstest -t -A -c \
            "SELECT (to_regclass('public.extraction_corrections') IS NOT NULL)::text;")
          [ "$TABLE" = "true" ] || { echo "FAIL: table extraction_corrections absente"; exit 1; }

          VIEW=$(psql -h localhost -U postgres -d dmstest -t -A -c \
            "SELECT (to_regclass('public.structured_data_effective') IS NOT NULL)::text;")
          [ "$VIEW" = "true" ] || { echo "FAIL: vue structured_data_effective absente"; exit 1; }

          TRG=$(psql -h localhost -U postgres -d dmstest -t -A -c \
            "SELECT COUNT(*) FROM information_schema.triggers WHERE event_object_table='extraction_corrections';")
          [ "$TRG" -gt 0 ] || { echo "FAIL: aucun trigger sur extraction_corrections"; exit 1; }

          DOCID=$(psql -h localhost -U postgres -d dmstest -t -A -c \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='extraction_corrections' AND column_name='document_id';")
          [ "$DOCID" = "0" ] || { echo "FAIL: colonne document_id présente (fantôme)"; exit 1; }

          VIEWS=$(psql -h localhost -U postgres -d dmstest -t -A -c \
            "SELECT COUNT(*) FROM information_schema.views WHERE table_name IN ('structured_data_effective','extraction_corrections_history');")
          [ "$VIEWS" = "2" ] || { echo "FAIL: vues attendues=2 trouvées=$VIEWS"; exit 1; }

          echo "=== TOUTES LES ASSERTIONS DB PASSÉES — forensic OK ==="

      - name: Ruff check
        run: ruff check src tests

      - name: Black check
        run: black --check src tests

      # SECRET_KEY éphémère par run (import main:app) — pas de secret figé dans le YAML
      - name: Ephemeral SECRET_KEY for FastAPI auth audit
        run: |
          echo "SECRET_KEY=$(python -c 'import secrets; print(secrets.token_hex(32))')" >> "$GITHUB_ENV"

      - name: Auth coverage audit (main:app — extractions)
        run: python scripts/audit_fastapi_auth_coverage.py --app main:app --fail-prefix /api/extractions

      - name: Auth audit report + artifact (main:app)
        run: |
          python scripts/audit_fastapi_auth_coverage.py --app main:app \
            --report-md docs/audits/artifacts/audit_main_app_auth_coverage.md

      - name: Upload FastAPI auth audit (main:app)
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-auth-audit-main-app
          path: docs/audits/artifacts/audit_main_app_auth_coverage.md
          if-no-files-found: error

      - name: Auth audit (src.api.main:app — informational Markdown)
        continue-on-error: true
        run: |
          python scripts/audit_fastapi_auth_coverage.py --app src.api.main:app \
            --report-md docs/audits/artifacts/audit_src_api_main_app_table.md

      - name: Auth + case-guard gates (modular app)
        run: |
          python scripts/audit_fastapi_auth_coverage.py --app src.api.main:app \
            --fail-prefix /mercuriale \
            --fail-prefix /price-check \
            --fail-prefix /vendors \
            --fail-prefix /api/documents \
            --fail-prefix /api/analysis \
            --fail-prefix /api/memory \
            --fail-prefix /api/scoring \
            --fail-sensitive-prefix /api/cases \
            --fail-sensitive-prefix /api/extractions

      - name: Resolve coverage gate
        id: cov_gate
        run: |
          if [ -f .milestones/M-TESTS.done ]; then
            echo "fail_under=65" >> "$GITHUB_OUTPUT"
          else
            echo "fail_under=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        env:
          TESTING: "true"
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ steps.cov_gate.outputs.fail_under }} \
            -v --tb=short

      - name: Annotation backend + M12 export (services/annotation-backend)
        env:
          PSEUDONYM_SALT: "ci-test-salt"
          ALLOW_WEAK_PSEUDONYMIZATION: "1"
        run: |
          pip install -q -r services/annotation-backend/requirements.txt
          pytest services/annotation-backend/tests -q --tb=short
          pytest tests/test_export_ls_m12_v2.py -q --tb=short
          python scripts/validate_annotation.py data/annotations/fixtures/golden_dms_line.jsonl

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
