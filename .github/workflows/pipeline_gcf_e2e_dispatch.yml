# Pipeline pilote — contrôles manuels (non bloquant sur PR).
# DMS_PASS1_HEADLESS : uniquement pour scripts E2E documentés (voir docs/ops/PIPELINE_PILOT_ENTERPRISE_GATE.md),
# jamais activé par défaut sur l’application Railway.
name: Pipeline pilot checks (manual)

on:
  workflow_dispatch:

jobs:
  unit-pipeline-ui-frame:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Tests — bundling Pass-1 + evaluation frame (M14 / dao enrich)
        run: |
          pytest tests/assembler/test_graph_bundle_vendor.py \
            tests/cognitive/test_evaluation_frame.py -q --tb=short

      - name: Note E2E complet GCF
        run: |
          echo "E2E ZIP complet : DATABASE_URL + deps LLM ; ex.:"
          echo "  DMS_PASS1_HEADLESS=1 python scripts/e2e_gcf_offers_pipeline_matrix.py --docx-only"
          echo "Voir docs/ops/GCF_ZIP_E2E_RUNBOOK.md"
