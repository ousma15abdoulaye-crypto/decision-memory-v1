[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "BLE",   # flake8-blind-except — track blind Exception catches
]
ignore = [
    "E501",    # line too long (handled by black)
    "BLE001",  # blind except — tracked, ~130 hits to clean up progressively
]

[tool.ruff.lint.isort]
known-first-party = ["src", "prompts", "config"]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402"]  # load_dotenv + configure_logging avant imports applicatifs (bootstrap prod)
"services/annotation-backend/backend.py" = ["E402"]  # sys.path monorepo avant imports prompts / src
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"tests/**/*.py" = ["E501"]  # Allow long lines in tests
"src/business/templates.py" = ["N806"]  # Constants in functions (ORANGE_FILL, REVUE_MANUELLE)
"tests/couche_b/conftest.py" = ["N806"]  # SessionLocal is a class-like factory function

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "smoke: marks tests as smoke tests",
    "db: marks tests requiring live PostgreSQL (RLS / isolation)",
    "db_integrity: marks tests requiring DB integrity (triggers, migrations)",
    "asyncio: asyncio test (pytest-asyncio)",
]

[tool.coverage.run]
omit = [
    "test_*.py",
    "investigate_db.py",
    "*/tests/*",
    "*/.venv/*",
    "*/venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
