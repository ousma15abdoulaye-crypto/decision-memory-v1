# M12 V6 — Mandatory parts: GRN (Goods Received Note)
document_kind: grn
description: "Goods Received Note / Bon de réception"

mandatory_parts:
  numero_reception:
    level_1:
      patterns: ["GRN", "bon de réception", "goods received", "BR", "n°"]
    level_2:
      keywords: []
      custom_rule: "detect_reference_number"
    threshold: 0.85

  fournisseur_identifie:
    level_1:
      patterns: []
    level_2:
      keywords: []
      custom_rule: "detect_entity_name"
    threshold: 0.80

  lignes_recues:
    level_1:
      patterns: []
    level_2:
      keywords: []
      custom_rule: "detect_table_min3"
    threshold: 0.80

  quantites_etat:
    level_1:
      patterns: ["quantité reçue", "état", "conforme", "non conforme"]
    level_2:
      keywords: ["reçu", "vérifié", "accepté", "refusé"]
      min_hits: 1
      window: 3
    threshold: 0.75

  signature_reception:
    level_1:
      patterns: ["réceptionnaire", "received by", "signature"]
    level_2:
      keywords: []
      custom_rule: "detect_signature_blocks"
    threshold: 0.75
